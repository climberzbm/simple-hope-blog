name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd server && npx prisma@5.22.0 generate

      - name: Build all projects
        run: pnpm -r build

      # Server: 准备部署
      - name: Prepare server
        run: |
          cd server
          # 不 prune，保留完整 node_modules（包含 prisma CLI）
          echo "Server ready for deployment"

      # Web: 复制 static 文件到 standalone
      - name: Prepare web
        run: |
          cd web
          mkdir -p .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

      # 打包部署文件
      - name: Create deployment package
        run: |
          mkdir -p package/server package/web package/admin
          
          # Server: dist + node_modules + prisma
          cp -r server/dist package/server/
          cp -r server/node_modules package/server/
          cp -r server/prisma package/server/
          
          # Web: standalone 内容直接放 web 目录（不需要嵌套）
          cp -r web/.next/standalone/* package/web/
          # static 和 public 放到正确位置
          mkdir -p package/web/.next/static
          cp -r web/.next/static/* package/web/.next/static/
          cp -r web/public package/web/
          
          # Admin: 静态文件
          cp -r admin/dist package/admin/
          
          # PM2 配置
          cp ecosystem.config.js package/
          
          # 打包
          tar -czvf deploy.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            
            BASE="/var/www/simple-hope-blog"
            
            echo ">>> Extracting..."
            cd /tmp && tar -xzvf deploy.tar.gz -C $BASE
            
            echo ">>> Running migrations..."
            cd $BASE/server
            npx prisma@5.22.0 migrate deploy
            
            echo ">>> Restarting services..."
            pm2 restart all || pm2 start $BASE/ecosystem.config.js
            
            echo ">>> Cleanup..."
            rm -f /tmp/deploy.tar.gz
            
            pm2 list
            echo ">>> Done!"