# 后端
upstream blog_server {
    server 127.0.0.1:3001;
    keepalive 64;
}

# 用户端
upstream blog_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# 管理端
upstream blog_admin {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    server_name climberzbm.cn www.climberzbm.cn;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# 用户端
server {
    listen 443 ssl http2;
    server_name climberzbm.cn www.climberzbm.cn;

    # SSL 证书（使用 Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/climberzbm.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/climberzbm.cn/privkey.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # API
    location /api {
        proxy_pass http://blog_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 上传文件
    location /uploads {
        proxy_pass http://blog_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 管理后台
    location /admin {
        rewrite ^/admin(.*)$ $1 break;
        proxy_pass http://blog_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 用户端
    location / {
        proxy_pass http://blog_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}